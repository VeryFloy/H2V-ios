name: iOS Build & Sign

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA (Ad Hoc)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Validate: no localhost URLs ───────────────────────────────────────
      - name: Check production URLs
        run: |
          if grep -r "localhost" h2v_ios/Network.swift; then
            echo "ERROR: localhost found in Network.swift"
            exit 1
          fi
          echo "URLs OK"

      # ── 2. Select Xcode 16 ────────────────────────────────────────────────────
      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer   || \
          true
          xcodebuild -version

      # ── 3. Import signing certificate ────────────────────────────────────────
      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          CERT_INPUT="$RUNNER_TEMP/cert_input.p12"
          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          CERT_PEM="$RUNNER_TEMP/cert.pem"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="h2v_keychain_pass"

          # Check secret is set
          if [ -z "$P12_BASE64" ]; then
            echo "ERROR: IOS_P12_BASE64 secret is empty or not set!"
            echo "On Windows, create it with PowerShell:"
            echo '  [Convert]::ToBase64String([IO.File]::ReadAllBytes("cert.p12"))'
            exit 1
          fi
          echo "Secret length: ${#P12_BASE64} chars"

          # Clean and decode:
          # - Strip certutil headers (-----BEGIN/END CERTIFICATE-----)
          # - Strip "CertUtil: ..." lines
          # - Remove all whitespace/CRLF/spaces
          echo "$P12_BASE64"          \
            | grep -v -- '-----'      \
            | grep -v 'CertUtil'      \
            | tr -d ' \t\r\n'         \
            | base64 --decode > "$CERT_INPUT"

          FILESIZE=$(wc -c < "$CERT_INPUT" | tr -d ' ')
          echo "Decoded size: $FILESIZE bytes"
          echo "File type: $(file "$CERT_INPUT")"

          if [ "$FILESIZE" -eq 0 ]; then
            echo "ERROR: Decoded file is empty."
            echo "Re-create IOS_P12_BASE64 secret on Windows using PowerShell:"
            echo '  [Convert]::ToBase64String([IO.File]::ReadAllBytes("C:\path\to\cert.p12"))'
            exit 1
          fi

          # Re-encrypt with modern AES-256 (macOS 13+ rejects legacy 3DES p12)
          echo "Converting p12 to modern AES-256 cipher..."
          if openssl pkcs12 -legacy -in "$CERT_INPUT" \
               -passin "pass:$P12_PASSWORD" \
               -passout "pass:$P12_PASSWORD" \
               -out "$CERT_PEM" 2>/dev/null; then
            echo "Legacy p12 detected, converted to PEM"
          else
            openssl pkcs12 -in "$CERT_INPUT" \
              -passin "pass:$P12_PASSWORD" \
              -passout "pass:$P12_PASSWORD" \
              -out "$CERT_PEM" || {
                echo "ERROR: Cannot open p12. Check IOS_P12_PASSWORD secret."
                exit 1
              }
            echo "Modern p12, converted to PEM"
          fi

          openssl pkcs12 -export \
            -in "$CERT_PEM" \
            -out "$CERT_PATH" \
            -passin "pass:$P12_PASSWORD" \
            -passout "pass:$P12_PASSWORD"
          echo "Modern p12 size: $(wc -c < "$CERT_PATH" | tr -d ' ') bytes"

          # Create and configure keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import modern p12
          security import "$CERT_PATH" \
            -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Add to search list and verify
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          rm -f "$CERT_INPUT" "$CERT_PATH" "$CERT_PEM"

      # ── 4. Install provisioning profile ──────────────────────────────────────
      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -z "$PROFILE_BASE64" ]; then
            echo "ERROR: IOS_PROVISIONING_PROFILE_BASE64 secret is empty!"
            exit 1
          fi

          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"

          PROFILE_PATH="$PROFILES_DIR/h2v_adhoc.mobileprovision"
          echo "$PROFILE_BASE64"   \
            | grep -v -- '-----'   \
            | grep -v 'CertUtil'   \
            | tr -d ' \t\r\n'      \
            | base64 --decode > "$PROFILE_PATH"

          echo "Profile size: $(wc -c < "$PROFILE_PATH" | tr -d ' ') bytes"

          # UUID is known from local analysis — rename to UUID.mobileprovision
          # (xcodebuild finds profiles by UUID filename, not by arbitrary name)
          PROFILE_UUID="803396da-d256-424c-8a14-179a3ffe3012"
          mv "$PROFILE_PATH" "$PROFILES_DIR/$PROFILE_UUID.mobileprovision"
          echo "Profile installed as: $PROFILE_UUID.mobileprovision"
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV

      # ── 5. Build & Archive ────────────────────────────────────────────────────
      - name: Build archive
        run: |
          xcodebuild archive \
            -project h2v_ios.xcodeproj \
            -scheme h2v_ios \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/h2v.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            DEVELOPMENT_TEAM=XC7G4T565G \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/app-signing.keychain-db" \
            SUPPORTS_MACCATALYST=NO \
            SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD=NO \
            ONLY_ACTIVE_ARCH=NO \
            IPHONEOS_DEPLOYMENT_TARGET=17.0 \
            ENABLE_ON_DEMAND_RESOURCES=NO

      # ── 6. Export IPA ─────────────────────────────────────────────────────────
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/h2v.xcarchive" \
            -exportPath "$RUNNER_TEMP/ipa" \
            -exportOptionsPlist ExportOptions.plist

      # ── 7. Upload artifact ────────────────────────────────────────────────────
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: H2V-iOS-${{ github.sha }}
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 30
