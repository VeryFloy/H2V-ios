name: iOS Build & Release

on:
  push:
    branches: [main, master]
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release:
        description: "Create a GitHub Release after build"
        type: boolean
        default: false

jobs:
  build:
    name: 🔨 Build IPA
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Version ──────────────────────────────────────────────────────────────
      - name: Compute version & build number
        id: ver
        run: |
          # Marketing version: from git tag (v1.2.3 → 1.2.3) or pbxproj fallback
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            MKTVER="${GITHUB_REF_NAME#v}"
          else
            MKTVER=$(grep 'MARKETING_VERSION' h2v_ios.xcodeproj/project.pbxproj \
                       | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' | head -1)
            MKTVER="${MKTVER:-1.0}"
          fi
          # Build number = total git commit count (auto-increments with every push)
          BUILD=$(git rev-list --count HEAD)
          echo "MKTVER=$MKTVER"   >> "$GITHUB_OUTPUT"
          echo "BUILD=$BUILD"     >> "$GITHUB_OUTPUT"
          echo "TAG_NAME=v$MKTVER" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $MKTVER  Build: $BUILD"

      # ── Validate ─────────────────────────────────────────────────────────────
      - name: Check production URLs
        run: |
          if grep -r "localhost" h2v_ios/Network.swift; then
            echo "ERROR: localhost found in Network.swift"
            exit 1
          fi
          echo "URLs OK"

      # ── Xcode ────────────────────────────────────────────────────────────────
      - name: Select Xcode
        run: |
          for ver in 16.6 16.5 16.4 16.3 16.2 16.1 16.0; do
            XCODE_PATH="/Applications/Xcode_${ver}.app/Contents/Developer"
            if [ -d "$XCODE_PATH" ]; then
              sudo xcode-select -s "$XCODE_PATH"
              echo "Selected Xcode $ver"
              break
            fi
          done
          xcodebuild -version

      - name: Install iOS platform
        run: |
          sudo xcodebuild -runFirstLaunch 2>&1 | tail -3 || true
          xcodebuild -downloadPlatform iOS 2>&1 | tail -5 || true

      # ── Signing ───────────────────────────────────────────────────────────────
      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          CERT_INPUT="$RUNNER_TEMP/cert_input.p12"
          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          CERT_PEM="$RUNNER_TEMP/cert.pem"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="h2v_keychain_pass"

          if [ -z "$P12_BASE64" ]; then
            echo "ERROR: IOS_CERTIFICATE_BASE64 secret is empty!"
            exit 1
          fi

          echo "$P12_BASE64" \
            | grep -v -- '-----' \
            | grep -v 'CertUtil' \
            | tr -d ' \t\r\n' \
            | base64 --decode > "$CERT_INPUT"

          FILESIZE=$(wc -c < "$CERT_INPUT" | tr -d ' ')
          echo "Decoded cert size: $FILESIZE bytes"
          if [ "$FILESIZE" -eq 0 ]; then
            echo "ERROR: Decoded cert is empty."
            exit 1
          fi

          if openssl pkcs12 -legacy -in "$CERT_INPUT" \
               -passin "pass:$P12_PASSWORD" \
               -passout "pass:$P12_PASSWORD" \
               -out "$CERT_PEM" 2>/dev/null; then
            echo "Legacy p12 → converted to PEM"
          else
            openssl pkcs12 -in "$CERT_INPUT" \
              -passin "pass:$P12_PASSWORD" \
              -passout "pass:$P12_PASSWORD" \
              -out "$CERT_PEM" || { echo "ERROR: Cannot open p12."; exit 1; }
          fi

          openssl pkcs12 -export \
            -in "$CERT_PEM" \
            -out "$CERT_PATH" \
            -passin "pass:$P12_PASSWORD" \
            -passout "pass:$P12_PASSWORD"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          rm -f "$CERT_INPUT" "$CERT_PATH" "$CERT_PEM"

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -z "$PROFILE_BASE64" ]; then
            echo "ERROR: IOS_PROVISIONING_PROFILE_BASE64 secret is empty!"
            exit 1
          fi

          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"

          PROFILE_PATH="$PROFILES_DIR/h2v_adhoc.mobileprovision"
          echo "$PROFILE_BASE64" \
            | grep -v -- '-----' \
            | grep -v 'CertUtil' \
            | tr -d ' \t\r\n' \
            | base64 --decode > "$PROFILE_PATH"

          echo "Profile size: $(wc -c < "$PROFILE_PATH" | tr -d ' ') bytes"

          PROFILE_UUID="803396da-d256-424c-8a14-179a3ffe3012"
          mv "$PROFILE_PATH" "$PROFILES_DIR/$PROFILE_UUID.mobileprovision"
          echo "Profile installed: $PROFILE_UUID.mobileprovision"
          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build archive
        run: |
          xcodebuild archive \
            -project h2v_ios.xcodeproj \
            -scheme h2v_ios \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/h2v.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            DEVELOPMENT_TEAM=XC7G4T565G \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/app-signing.keychain-db" \
            MARKETING_VERSION="${{ steps.ver.outputs.MKTVER }}" \
            CURRENT_PROJECT_VERSION="${{ steps.ver.outputs.BUILD }}" \
            SUPPORTS_MACCATALYST=NO \
            SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/h2v.xcarchive" \
            -exportPath "$RUNNER_TEMP/ipa" \
            -exportOptionsPlist ExportOptions.plist

      # Name the IPA with version + build so it's easy to identify
      - name: Rename IPA
        run: |
          IPA=$(find "$RUNNER_TEMP/ipa" -name "*.ipa" | head -1)
          DEST="$RUNNER_TEMP/ipa/H2V-v${{ steps.ver.outputs.MKTVER }}-build${{ steps.ver.outputs.BUILD }}.ipa"
          mv "$IPA" "$DEST"
          echo "IPA_PATH=$DEST" >> "$GITHUB_ENV"

      # ── Artifact ──────────────────────────────────────────────────────────────
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: H2V-v${{ steps.ver.outputs.MKTVER }}-build${{ steps.ver.outputs.BUILD }}
          path: ${{ env.IPA_PATH }}
          retention-days: 90

      # ── GitHub Release (only on version tags or manual trigger) ───────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG_NAME }}
          name: "H2V iOS ${{ steps.ver.outputs.TAG_NAME }}"
          body: |
            ## H2V Messenger iOS ${{ steps.ver.outputs.TAG_NAME }}

            **Build:** `${{ steps.ver.outputs.BUILD }}`
            **Commit:** `${{ github.sha }}`

            ### Изменения
            ${{ github.event.head_commit.message }}

            ---
            > Установка: скачай `.ipa` и установи через [AltStore](https://altstore.io) или [Sideloadly](https://sideloadly.io).
          files: ${{ env.IPA_PATH }}
          draft: false
          prerelease: false
