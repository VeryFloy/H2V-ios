name: iOS Build & Sign

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA (Ad Hoc)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Validate: no localhost URLs ───────────────────────────────────────
      - name: Check production URLs
        run: |
          if grep -r "localhost" h2v_ios/Network.swift; then
            echo "ERROR: localhost found in Network.swift"
            exit 1
          fi
          echo "URLs OK"

      # ── 2. Select Xcode 16 ────────────────────────────────────────────────────
      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer   || \
          true
          xcodebuild -version

      # ── 3. Import signing certificate (macOS 13+ compatible) ─────────────────
      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="temp_keychain_password_h2v"

          # Decode certificate
          echo "$P12_BASE64" | base64 --decode -o "$CERT_PATH"

          # Create and configure keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate with -A (allow all apps) and explicit format
          security import "$CERT_PATH" \
            -P "$P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Add to keychain search list
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Verify import
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          rm "$CERT_PATH"

      # ── 4. Install provisioning profile ──────────────────────────────────────
      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROFILE_BASE64 }}
        run: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo "$PROFILE_BASE64" | base64 --decode -o "$PROFILES_DIR/h2v_adhoc.mobileprovision"
          echo "Installed profile:"
          ls -la "$PROFILES_DIR/"

      # ── 5. Build & Archive ────────────────────────────────────────────────────
      - name: Build archive
        run: |
          xcodebuild archive \
            -project h2v_ios.xcodeproj \
            -scheme h2v_ios \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/h2v.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="h2v_adhoc" \
            DEVELOPMENT_TEAM=ZYDGWHPX4W \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/app-signing.keychain-db"

      # ── 6. Export IPA ─────────────────────────────────────────────────────────
      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/h2v.xcarchive" \
            -exportPath "$RUNNER_TEMP/ipa" \
            -exportOptionsPlist ExportOptions.plist

      # ── 7. Upload artifact ────────────────────────────────────────────────────
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: H2V-iOS-${{ github.sha }}
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 30
